<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Amir Shayegh — agentic developer + iOS">
  <defs>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#0c0c0c" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Cream background -->
  <rect width="1200" height="320" fill="#f1efe9"/>
  <rect width="1200" height="320" fill="url(#dots)"/>

  <!-- Big background numeral "9" — nine years -->
  <text x="1188" y="310" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="420" font-weight="800" fill="#e3dfd0" text-anchor="end" letter-spacing="-12">9</text>

  <!-- Top eyebrow: short rule + label -->
  <line x1="60" y1="55" x2="100" y2="55" stroke="#0c0c0c" stroke-width="1.5"/>
  <text x="110" y="59" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#6a6a64" letter-spacing="3" font-weight="500">AMIR SHAYEGH · PORTFOLIO</text>

  <!-- Status pill -->
  <g transform="translate(880, 42)">
    <rect width="260" height="26" rx="13" fill="#e8e5dc" stroke="#d8d5cc" stroke-width="1"/>
    <circle cx="16" cy="13" r="4" fill="#c6ff3a"/>
    <text x="30" y="17" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="9" fill="#2a2a28" letter-spacing="1.8" font-weight="600">OPEN TO AI / iOS STAFF ROLES</text>
  </g>

  <!-- Display: agentic -->
  <text x="60" y="170" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="104" font-weight="800" fill="#0c0c0c" letter-spacing="-5">agentic</text>

  <!-- Display: + mobile (with accent + and small sup 9y) -->
  <text x="60" y="265" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="104" font-weight="800" letter-spacing="-5">
    <tspan fill="#ff4d12">+</tspan><tspan fill="#0c0c0c"> mobile</tspan>
  </text>
  <text x="610" y="225" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" font-weight="500" fill="#ff4d12" letter-spacing="-1">9y</text>

  <!-- Bottom strip mono: project ribbon -->
  <text x="60" y="305" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#6a6a64" letter-spacing="2">storybloq · picolibro · jamie health · pi claude · ey · wikisleep</text>

  <!-- Bottom right: site -->
  <text x="1140" y="305" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#6a6a64" letter-spacing="2" text-anchor="end">shayegh.ca ↗</text>

  <!-- Subtle frame line -->
  <rect x="0.5" y="0.5" width="1199" height="319" fill="none" stroke="#0c0c0c" stroke-width="1" opacity="0.06"/>
</svg>
