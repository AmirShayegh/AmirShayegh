<svg width="900" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="#0a0a0a"/>
  <rect width="900" height="180" fill="url(#grid)"/>

  <!-- Corner brackets — targeting UI -->
  <line x1="24" y1="20" x2="64" y2="20" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="20" x2="24" y2="60" stroke="#dc2626" stroke-width="1" opacity="0.5"/>

  <line x1="876" y1="160" x2="836" y2="160" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <line x1="876" y1="160" x2="876" y2="120" stroke="#dc2626" stroke-width="1" opacity="0.5"/>

  <!-- Subtle edge -->
  <rect x="0.5" y="0.5" width="899" height="179" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Name -->
  <text x="450" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="300" fill="#ededed" letter-spacing="-1" text-anchor="middle">Amir Shayegh</text>

  <!-- Tagline -->
  <text x="450" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#737373" font-style="italic" text-anchor="middle">Building things that think.</text>

  <!-- Subtitle -->
  <text x="450" y="148" font-family="'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="9" fill="#404045" letter-spacing="2.5" text-anchor="middle">PRODUCT ENGINEER · AGENTIC DEVELOPER · iOS · FULL STACK</text>
</svg>
